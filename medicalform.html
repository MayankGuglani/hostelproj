<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Application Form</title>

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e5e5e5;
    font-family: Arial, sans-serif;
}

.main {
    width: 700px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    padding: 20px;
}

fieldset {
    border: 2px solid #2563eb;
    border-radius: 10px;
    padding: 20px;
}

legend {
    font-weight: bold;
    color: #2563eb;
}

label {
    font-size: 13px;
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

.inp {
    width: 100%;
    padding: 7px;
    margin-top: 4px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.option-group {
    display: flex;
    gap: 20px;
    margin-top: 6px;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="main">
<form onsubmit="return submitForm()">

<fieldset>
<legend>Leave Application Form</legend>

<label>Name</label>
<input type="text" class="inp" required>

<label>Student ID</label>
<input type="text" class="inp" required>

<label>Email</label>
<input type="email" class="inp">

<label>Phone</label>
<input type="tel" class="inp">

<label>Gender</label>
<div class="option-group">
<label><input type="radio" name="g" required> Male</label>
<label><input type="radio" name="g"> Female</label>
</div>

<label>Start Date</label>
<input type="date" class="inp" required>

<label>End Date</label>
<input type="date" class="inp" required>

<label>Reason</label>
<div class="option-group">
<label><input type="radio" name="r" required> Medical</label>
<label><input type="radio" name="r"> Home</label>
</div>

<button type="submit">Submit</button>

</fieldset>
</form>
</div>

<script>
function submitForm(){
    alert("Leave Applied Successfully!");
    window.location.href = "loginpage.html";
    return false;
}
</script>

</body>
</html>
