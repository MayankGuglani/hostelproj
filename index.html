<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel H10</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* NAVBAR */
nav {
    background: #1e293b;
    padding: 15px;
    text-align: center;
}
nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
}
nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero img {
    width: 100%;
    height: 60vh;
    object-fit: cover;
}

/* SECTION */
.container {
    padding: 30px;
}
.section {
    margin-bottom: 30px;
    padding: 20px;
    border: 2px solid #1e293b;
    border-radius: 10px;
    background: white;
}

/* FACILITIES */
.cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.card {
    padding: 10px;
    border: 2px solid #2563eb;
    border-radius: 8px;
}

/* BUTTON */
.btn {
    display: block;
    width: 200px;
    margin: auto;
    padding: 10px;
    background: #2563eb;
    color: white;
    text-align: center;
    border-radius: 5px;
    text-decoration: none;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border: 1px solid #ccc;
}
th {
    background: #2563eb;
    color: white;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="#">Home</a>
    <a href="#facilities">Facilities</a>
    <a href="#fees">Fees</a>
    <a href="#leave">Leave</a>
    <a href="#location">Location</a>
    <a href="loginpage.html">Login</a>
    <a href="signup.html">Signup</a>
</nav>

<!-- IMAGE -->
<img src="hostel.jpeg" usemap="#map">

<map name="map">
<area shape="rect" coords="0,0,1600,1000" href="https://www.nitkkr.ac.in" target="_blank">
</map>

<div class="container">

<div class="section" id="facilities">
<h2>Facilities</h2>
<div class="cards">
<div class="card">24x7 Electricity</div>
<div class="card">WiFi</div>
<div class="card">Mess</div>
<div class="card">Gym</div>
</div>
</div>

<div class="section" id="fees">
<h2>Fees</h2>
<table>
<tr><th>Room</th><th>Fees</th></tr>
<tr><td>Single</td><td>₹40000</td></tr>
<tr><td>Double</td><td>₹30000</td></tr>
</table>
</div>

<div class="section" id="leave">
<h2>Leave</h2>
<a href="medicalform.html" class="btn">Apply Leave</a>
</div>

<div class="section" id="location">
<h2>Location</h2>
<iframe width="100%" height="300"
src="https://maps.google.com/maps?q=nit%20kurukshetra&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>
</div>

</div>

</body>
</html>
